<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Ficbook Old Style</title>
	<style></style>
	<link rel="stylesheet" href="popup.css">
	<link rel="stylesheet" href="switch.css">
</head>

<body>
	<div class="main">

		<div class="container-main-title">
			<div class="container-title">
				<h3>Дизайн Фикбука</h3>
			</div>
			<div class="container-switch">
				<label for="switch" class="gui-switch">
					On
					<input type="checkbox" role="switch" id="switch">
				</label>
			</div>
		</div>

		<div class="tabs">
			<div class="tab-btn active" data-tab="old-style">Старый дизайн</div>
			<div class="tab-btn" data-tab="new-features">Новые функции</div>
			<div class="tab-btn" data-tab="info">Информация</div>
			<!-- Добавьте другие вкладки по мере необходимости -->
		</div>

		<div class="tab-content active" id="old-style">
			<div class="container-custom-style">
				<div class="container-checkbox">
					<label for="bookCoverStyle">
						<input type="checkbox" id="bookCoverStyle" name="bookCoverStyle" />
						Добавить книжную обложку (old)
					</label><br />
				</div>

				<div class="container-checkbox">
					<label for="searchFullScreenStyle">
						<input type="checkbox" id="searchFullScreenStyle" name="searchFullScreenStyle" />
						Расширеный поиск на всю страницу (old)
					</label><br />
				</div>

				<div class="container-checkbox">
					<label for="removeBtnEndOfFic">
						<input type="checkbox" id="removeBtnEndOfFic" name="removeBtnEndOfFic" />
						Убрать кнопку "Вперед" в конце работы (old)
					</label><br />
				</div>

				<div class="container-checkbox">
					<label for="sidebarNavStyle">
						<input type="checkbox" id="sidebarNavStyle" name="sidebarNavStyle" />
						Профиль: больше шрифт и иконки в боковом меню, колокольчик (old)
					</label><br />
				</div>

				<div class="container-checkbox">
					<label for="headersPageStyle">
						<input type="checkbox" id="headersPageStyle" name="headersPageStyle" />
						Заголовки страниц больше (old)
					</label><br />
				</div>

				<div class="container-checkbox">
					<label for="removePromo">
						<input type="checkbox" id="removePromo" name="removePromo" />
						Без промо в списках и тексте (old)
					</label><br />
				</div>

				<div class="container-checkbox">
					<label for="addUnderlineFicTitles">
						<input type="checkbox" id="addUnderlineFicTitles" name="addUnderlineFicTitles" />
						Добавить подчеркивание для названий фанфиков (ссылки) (old)
					</label><br />
				</div>

				<div class="container-checkbox">
					<label for="changeColorFont">
						<input type="checkbox" id="changeColorFont" name="changeColorFont" />
						Изменить цвет текста на более темный (old)
					</label><br />
				</div>
			</div>
		</div>

		<div class="tab-content" id="new-features">
			<div class="container-custom-style">
				<div class="container-checkbox">
					<label for="commentsStyle">
						<input type="checkbox" id="commentsStyle" name="commentsStyle" />
						Стили для коментариев (под меня)
					</label><br />
				</div>

				<div class="container-checkbox">
					<label for="removeReaded">
						<input type="checkbox" id="removeReaded" name="removeReaded" />
						Скрыть прочитанные фанфики с популярного
					</label><br />
				</div>
			</div>
		</div>

		<div class="tab-content" id="info">
			<div class="container-custom-style">
				<div class="container-info">
					<div class="contact-info">
						<span class="info-title">Контактная информация:</span>
						<ul class="list-info">
							<li class="list-info-item">
								<span class="list-info-item-title">GitHub:</span>
								<a class="list-info-item-link" href="https://github.com/Yuriana25" target="_blank">Yuriana25</a>
							</li>
						</ul>
					</div>
					<div class="contact-info">
						<span class="info-title">Ссылка на проект:</span>
						<a href="https://github.com/Yuriana25/Ficbook-extension" target="_blank">GitHub</a>
					</div>
				</div>
			</div>
		</div>


		<div class="container-btn">
			<button class="btn" type="button" id="checkAll">Выбрать всё</button>
			<span class="btn-raz">⋮</span>
			<button class="btn" type="button" id="reset">Сбросить</button>
		</div>
	</div>
	<script src="popup.js" defer></script>
</body>

</html>
